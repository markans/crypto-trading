name: Bybit Daily Swing Signal

on:
  workflow_dispatch:
    inputs:
      top_marketcap:
        description: "Number of top market-cap symbols to scan."
        required: true
        default: "20"
      symbol:
        description: "Optional single pair to scan instead of the top list. Leave blank to scan the top list."
        required: false
        default: ""
      margin:
        description: "Margin in USDT (used only to size the suggested plan)."
        required: true
        default: "25"
      leverage:
        description: "Leverage (used only to size the suggested plan)."
        required: true
        default: "5"
  schedule:
    # GitHub Actions cron is UTC. Run shortly after the daily candle close (00:00 UTC)
    # so the swing signal keys off a freshly closed daily candle.
    - cron: "5 0 * * *"

permissions:
  contents: read

concurrency:
  group: bybit-daily-swing-signal
  cancel-in-progress: false

jobs:
  swing-signal:
    runs-on: ubuntu-latest
    env:
      BYBIT_BASE_URL: ${{ secrets.BYBIT_BASE_URL }}
      BYBIT_MARKET_BASE_URL: ${{ secrets.BYBIT_MARKET_BASE_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      AUTO_TOP: "20"
      AUTO_SYMBOL: ""
      AUTO_MARGIN: "25"
      AUTO_LEVERAGE: "5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply manual inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_TOP: ${{ inputs.top_marketcap }}
          INPUT_SYMBOL: ${{ inputs.symbol }}
          INPUT_MARGIN: ${{ inputs.margin }}
          INPUT_LEVERAGE: ${{ inputs.leverage }}
        run: |
          printf 'AUTO_TOP=%s\n' "$INPUT_TOP" >> "$GITHUB_ENV"
          printf 'AUTO_SYMBOL=%s\n' "$INPUT_SYMBOL" >> "$GITHUB_ENV"
          printf 'AUTO_MARGIN=%s\n' "$INPUT_MARGIN" >> "$GITHUB_ENV"
          printf 'AUTO_LEVERAGE=%s\n' "$INPUT_LEVERAGE" >> "$GITHUB_ENV"

      - name: Check notification config
        run: |
          if [ -z "${SMTP_HOST}" ] || [ -z "${EMAIL_TO}" ]; then
            echo "::warning::SMTP_HOST or EMAIL_TO secret is not set - strong-signal emails will NOT be sent."
          else
            echo "Email configured: strong signals will be sent to ${EMAIL_TO} via ${SMTP_HOST}."
          fi

      - name: Run swing-signal generator
        run: |
          if [ -n "${AUTO_SYMBOL}" ]; then
            python3 scripts/bybit_signal.py \
              --symbol "$AUTO_SYMBOL" \
              --margin "$AUTO_MARGIN" \
              --leverage "$AUTO_LEVERAGE" \
              --tp-sl-mode structure \
              --structure-interval D
          else
            python3 scripts/bybit_signal.py \
              --top-marketcap "$AUTO_TOP" \
              --margin "$AUTO_MARGIN" \
              --leverage "$AUTO_LEVERAGE" \
              --tp-sl-mode structure \
              --structure-interval D
          fi

      - name: Upload signal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-log
          path: SIGNAL-LOG.md
