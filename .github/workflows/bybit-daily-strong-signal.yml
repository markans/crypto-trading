name: Bybit Daily Swing Signal

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated pairs to scan."
        required: true
        default: "BTCUSDT,ETHUSDT,DOGEUSDT,XRPUSDT,SOLUSDT,MNTUSDT,SUIUSDT,HYPEUSDT"
      margin:
        description: "Margin in USDT (used only to size the suggested plan)."
        required: true
        default: "25"
      leverage:
        description: "Leverage (used only to size the suggested plan)."
        required: true
        default: "5"
  schedule:
    # GitHub Actions cron is UTC. Run shortly after the daily candle close (00:00 UTC)
    # so the swing signal keys off a freshly closed daily candle.
    - cron: "5 0 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: bybit-daily-swing-signal
  cancel-in-progress: false

jobs:
  swing-signal:
    runs-on: ubuntu-latest
    env:
      BYBIT_BASE_URL: ${{ secrets.BYBIT_BASE_URL }}
      BYBIT_MARKET_BASE_URL: ${{ secrets.BYBIT_MARKET_BASE_URL }}
      AUTO_SYMBOLS: "BTCUSDT,ETHUSDT,DOGEUSDT,XRPUSDT,SOLUSDT,MNTUSDT,SUIUSDT,HYPEUSDT"
      AUTO_MARGIN: "25"
      AUTO_LEVERAGE: "5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply manual inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_SYMBOLS: ${{ inputs.symbols }}
          INPUT_MARGIN: ${{ inputs.margin }}
          INPUT_LEVERAGE: ${{ inputs.leverage }}
        run: |
          printf 'AUTO_SYMBOLS=%s\n' "$INPUT_SYMBOLS" >> "$GITHUB_ENV"
          printf 'AUTO_MARGIN=%s\n' "$INPUT_MARGIN" >> "$GITHUB_ENV"
          printf 'AUTO_LEVERAGE=%s\n' "$INPUT_LEVERAGE" >> "$GITHUB_ENV"

      - name: Run swing-signal generator
        run: |
          python3 scripts/bybit_signal.py \
            --symbols "$AUTO_SYMBOLS" \
            --margin "$AUTO_MARGIN" \
            --leverage "$AUTO_LEVERAGE" \
            --tp-sl-mode structure \
            --structure-interval D \
            --no-email \
            --summary-file strong-signals.md

      - name: Open issue for strong signals
        if: hashFiles('strong-signals.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # hashFiles is empty only when the file is absent; it may still be a
          # 0-byte placeholder when no signal qualified, so guard on size too.
          if [ ! -s strong-signals.md ]; then
            echo "No strong signals; no issue created."
            exit 0
          fi
          title="Strong swing signals - $(date -u +'%Y-%m-%d %H:%M UTC')"
          {
            cat strong-signals.md
            echo
            echo "cc @${{ github.repository_owner }}"
          } > issue-body.md
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$title" \
            --body-file issue-body.md \
            --assignee "${{ github.repository_owner }}"

      - name: Upload signal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-log
          path: SIGNAL-LOG.md
